<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGT | Tokyo Edogawa Boys</title>
    <style>
        /* --- 1. CSS: デザイン（バイブス）層 --- */
        :root {
            --primary: #007bff;
            --success: #28a745;
            --unicorn: linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff);
            --matsu: #ffd700; --take: #c0c0c0; --ume: #cd7f32;
        }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* 入力UI */
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; color: #666; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 18px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; }
        .btn-submit { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--primary); color: white; font-size: 18px; font-weight: bold; cursor: pointer; }

        /* 結果UI */
        #result-screen { display: none; text-align: center; animation: fadeInUp 0.6s ease-out; }
        .rank-badge { display: inline-block; padding: 12px 30px; border-radius: 50px; font-size: 28px; font-weight: 900; color: white; margin-bottom: 15px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .bmi-display { font-size: 40px; font-weight: 800; margin: 10px 0; color: #222; }
        .gauge-bg { height: 12px; background: #eee; border-radius: 6px; margin: 25px 0; position: relative; overflow: hidden; }
        #gauge-fill { height: 100%; width: 0%; background: var(--primary); transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1); }
        
        /* 比較エリア */
        .comp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .comp-item { background: #f8f9fa; padding: 15px; border-radius: 12px; }
        .comp-label { font-size: 11px; color: #888; display: block; }
        .comp-val { font-size: 20px; font-weight: bold; }

        /* 特殊アニメーション */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .unicorn-mode { background: var(--unicorn) !important; animation: rainbow 2s infinite linear; }
        @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-container">
    <div id="input-screen" class="card">
        <h2 style="margin-top:0;">📊 今週の計測</h2>
        <div class="input-group">
            <label>身長 (cm)</label>
            <input type="number" id="height" placeholder="170.5" step="0.1">
        </div>
        <div class="input-group">
            <label>体重 (kg)</label>
            <input type="number" id="weight" placeholder="65.0" step="0.1">
        </div>
        <button class="btn-submit" onclick="handleLogicFlow()">結果を見る</button>
    </div>

    <div id="result-screen" class="card">
        <div id="rank-badge" class="rank-badge">RANK</div>
        <div class="bmi-display" id="bmi-out">BMI 0.0</div>
        
        <div class="gauge-bg"><div id="gauge-fill"></div></div>
        
        <p id="goal-msg" style="font-weight: bold; color: #555;"></p>

        <div class="comp-grid">
            <div class="comp-item"><span class="comp-label">同期中央値</span><span class="comp-val" id="med-val">--</span></div>
            <div class="comp-item"><span class="comp-label">同期TOP</span><span class="comp-val" id="top-val">--</span></div>
        </div>
        <button class="btn-submit" style="margin-top:25px; background:#666;" onclick="location.reload()">戻る</button>
    </div>
</div>

<script type="module">
    /* --- 2. LOGIC: 定数・計算ロジック層 --- */
    const CONFIG = {
        RANK_LIMITS: { UME: 20.0, TAKE: 22.0, MATSU: 24.0, UNICORN: 26.0 },
        COLORS: { UME: '#cd7f32', TAKE: '#9da5a8', MATSU: '#ffd700', UNICORN: 'magenta' }
    };

    const calcBMI = (h, w) => parseFloat((w / ((h/100)**2)).toFixed(1));

    /* --- 3. FIREBASE: 繋ぎ込み（モック版） --- */
    // ※実際の実装時はここにFirebase Configとsave関数を配置
    const mockSaveAndFetchStats = async (bmi) => {
        // 通信中のバイブス演出用遅延
        await new Promise(r => setTimeout(r, 1200)); 
        return { median: 21.5, top: 25.2 }; // 統計のダミー
    };

    /* --- 4. UI/UX: 演出・制御層 --- */
    window.handleLogicFlow = async () => {
        const h = parseFloat(document.getElementById('height').value);
        const w = parseFloat(document.getElementById('weight').value);

        if(!h || !w || h < 100 || w < 20) return alert("正しい数値を入力してね！");

        const bmi = calcBMI(h, w);
        const btn = document.querySelector('.btn-submit');
        btn.innerText = "解析中..."; btn.disabled = true;

        try {
            const stats = await mockSaveAndFetchStats(bmi);
            
            // 画面切り替え
            document.getElementById('input-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';

            // ランク判定とバッジ更新
            updateRankUI(bmi);

            // BMIカウントアップ
            animateValue("bmi-out", 0, bmi, 1000, "BMI ");

            // ゲージ & 目標メッセージ
            renderGoalProgress(h, w, bmi);

            // 統計反映
            document.getElementById('med-val').innerText = stats.median;
            document.getElementById('top-val').innerText = stats.top;

        } catch (e) {
            alert("エラーが発生しました");
            location.reload();
        }
    };

    function updateRankUI(bmi) {
        const badge = document.getElementById('rank-badge');
        badge.classList.remove('unicorn-mode');
        
        if (bmi >= CONFIG.RANK_LIMITS.UNICORN) {
            badge.innerText = "UNICORN";
            badge.classList.add('unicorn-mode');
        } else if (bmi >= CONFIG.RANK_LIMITS.MATSU) {
            badge.innerText = "松 (プロ級)";
            badge.style.background = CONFIG.COLORS.MATSU;
        } else if (bmi >= CONFIG.RANK_LIMITS.TAKE) {
            badge.innerText = "竹 (アスリート)";
            badge.style.background = CONFIG.COLORS.TAKE;
        } else if (bmi >= CONFIG.RANK_LIMITS.UME) {
            badge.innerText = "梅 (アマチュア)";
            badge.style.background = CONFIG.COLORS.UME;
        } else {
            badge.innerText = "育成中";
            badge.style.background = "#888";
        }
    }

    function renderGoalProgress(h, w, bmi) {
        let nextTarget = CONFIG.RANK_LIMITS.UME;
        if (bmi >= CONFIG.RANK_LIMITS.MATSU) nextTarget = CONFIG.RANK_LIMITS.UNICORN;
        else if (bmi >= CONFIG.RANK_LIMITS.TAKE) nextTarget = CONFIG.RANK_LIMITS.MATSU;
        else if (bmi >= CONFIG.RANK_LIMITS.UME) nextTarget = CONFIG.RANK_LIMITS.TAKE;

        const targetW = nextTarget * ((h/100)**2);
        const diff = (targetW - w).toFixed(1);
        
        const progress = Math.min((bmi / nextTarget) * 100, 100);
        document.getElementById('gauge-fill').style.width = progress + "%";
        
        const msg = bmi >= CONFIG.RANK_LIMITS.UNICORN ? 
            "伝説の体格！維持せよ！" : `次の目標まで あと ${diff}kg`;
        document.getElementById('goal-msg').innerText = msg;
    }

    function animateValue(id, start, end, duration, prefix = "") {
        const obj = document.getElementById(id);
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            obj.innerHTML = prefix + (progress * (end - start) + start).toFixed(1);
            if (progress < 1) window.requestAnimationFrame(step);
        };
        window.requestAnimationFrame(step);
    }
</script>

</body>
</html>
